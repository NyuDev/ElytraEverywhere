name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build MC ${{ matrix.mc }}
    runs-on: ubuntu-latest
    strategy:
      # One Minecraft version failing to build must not cancel the others - each
      # row is an independent jar. Only 1.21.11 is runtime-verified in game; the
      # rest are best-effort (the Meteor-Baritone minified mixin targets still need
      # per-version checking), so we want to see exactly which ones compile.
      fail-fast: false
      matrix:
        include:
          - { mc: "1.21.1",  yarn: "1.21.1+build.3",  fabric: "0.116.12+1.21.1" }
          - { mc: "1.21.3",  yarn: "1.21.3+build.2",  fabric: "0.114.1+1.21.3" }
          - { mc: "1.21.4",  yarn: "1.21.4+build.8",  fabric: "0.119.4+1.21.4" }
          - { mc: "1.21.5",  yarn: "1.21.5+build.1",  fabric: "0.128.2+1.21.5" }
          - { mc: "1.21.8",  yarn: "1.21.8+build.1",  fabric: "0.136.1+1.21.8" }
          - { mc: "1.21.10", yarn: "1.21.10+build.3", fabric: "0.138.4+1.21.10" }
          - { mc: "1.21.11", yarn: "1.21.11+build.6", fabric: "0.141.4+1.21.11" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.mc }}-${{ hashFiles('**/*.gradle', 'gradle.properties') }}
          restore-keys: gradle-${{ matrix.mc }}-

      - name: Override Windows-only Gradle JVM args
        # The committed gradle.properties pins a Windows AF_UNIX tmpdir (C:/Temp) that
        # this dev machine needs; on Linux runners a user-level gradle.properties wins
        # and gives the daemon a clean, portable -Xmx instead.
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx3G" >> ~/.gradle/gradle.properties

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build \
            -Pminecraft_version=${{ matrix.mc }} \
            -Pyarn_mappings=${{ matrix.yarn }} \
            -Pfabric_version=${{ matrix.fabric }} \
            --stacktrace --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: elytraeverywhere-mc${{ matrix.mc }}
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    # Run on tag pushes even if some matrix builds failed, so a release ships every
    # version that did compile rather than nothing.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release jars
        run: |
          mkdir -p release
          find artifacts -name '*.jar' ! -name '*-sources.jar' -exec cp {} release/ \;
          echo "Jars to release:"
          ls -l release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
