name: Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build MC ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      # One Minecraft version failing to build must not cancel the others - each
      # node is an independent jar produced by the Stonecutter version tree.
      fail-fast: false
      matrix:
        node:
          - "1.21.1"
          - "1.21.3"
          - "1.21.4"
          - "1.21.5"
          - "1.21.8"
          - "1.21.10"
          - "1.21.11"
          - "26.1"
          - "26.1.1"
          - "26.1.2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 25 for everyone: Minecraft 26.x requires it, and Gradle configures every
      # Stonecutter node (incl. the 26.x ones) on every build, so even the 1.21.x jobs
      # need it. The 1.21.x compiles still target Java 21 bytecode (--release 21).
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.node }}-${{ hashFiles('**/*.gradle*', 'gradle.properties', 'versions.json') }}
          restore-keys: gradle-${{ matrix.node }}-

      - name: Override Windows-only Gradle JVM args
        # The committed gradle.properties pins a Windows AF_UNIX tmpdir (C:/Temp) that
        # the dev machine needs; on Linux runners a user-level gradle.properties wins
        # and gives the daemon a clean, portable -Xmx instead.
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4G" >> ~/.gradle/gradle.properties

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew ":${{ matrix.node }}:build" --stacktrace --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: elytraeverywhere-mc${{ matrix.node }}
          path: versions/${{ matrix.node }}/build/libs/*.jar
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    # Run on tag pushes even if some matrix builds failed, so a release ships every
    # version that did compile rather than nothing.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release jars
        run: |
          mkdir -p release
          find artifacts -name '*.jar' ! -name '*-sources.jar' -exec cp {} release/ \;
          echo "Jars to release:"
          ls -l release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
